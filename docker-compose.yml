version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartdoc-postgres
    environment:
      POSTGRES_USER: smartdoc
      POSTGRES_PASSWORD: smartdoc
      POSTGRES_DB: smartdoc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdoc"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartdoc-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
